<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portifolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <img id="my-logo-image" src="assets/img/lg-shiny-logo.png" alt="my-logo">
            <div class="nav-container">
                <p>Social</p>
                <a href="https://github.com/lluizgustavo" target="_blank"><img class="nav-image" src="assets/img/githubLogo.png" alt="my-github"></a>
                <a href="https://www.linkedin.com/in/luiz-gustavo-21b6b3353/" target="_blank"><img class="nav-image" src="assets/img/linkedinLogo.png" alt="my-linkedin"></a>
                <a href="https://myaccount.google.com/?hl=en&utm_source=OGB&utm_medium=act&gar=WzEyMF0&pli=1" target="_blank"><img class="nav-image" src="assets/img/mail.png" alt="my-email"></a>
                <a id="contact" href=""><div>Contato ➤ </div></a>               
            </div>
        </nav>
        <section class="main-content">

            <div id="hello">
                <img id="hand" src="assets/img/hand.png" alt="hand"><p>Olá! Eu sou</p>
            </div>

            <div class="my-name" >
                <span>Luiz</span>
                <span id="gold" >Gustavo</span>
            </div>

            <h3 id="h3">Desenvolvedor Web em formação</h3>

            <span class="about-me">Um entusiasta da tecnologia e pelo desenvolvimento web.
            Transformo ideias em experiências digitais e modernas, funcionais e focadas em resultados.</span>
            
            <button id="projects">
                <img class="rocket-and-download" src="assets/img/rocket.png" alt="">
                Ver meus projetos
            </button>

            <button id="cv">
                <img class="rocket-and-download" src="assets/img/download.png" alt="">
                Baixar meu CV
            </button>

        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
